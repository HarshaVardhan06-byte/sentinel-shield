<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAF Insider Threat Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --accent-blue: #00f0ff;
            --accent-red: #ff3366;
            --accent-green: #00ff9d;
            --accent-yellow: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,240,255,0.1) 0%, rgba(0,0,0,0) 70%);
            top: -200px;
            left: -200px;
            z-index: -1;
            animation: pulseGlow 8s infinite alternate;
        }

        .bg-glow-red {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255,51,102,0.08) 0%, rgba(0,0,0,0) 70%);
            bottom: -300px;
            right: -200px;
            z-index: -1;
            animation: pulseGlowRed 10s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        @keyframes pulseGlowRed {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        header {
            padding: 2rem 3rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        header h1 span {
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            padding: 2rem 3rem;
            flex-grow: 1;
        }

        /* Glassmorphic Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 8px 32px rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.2);
        }

        .card-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Simulator Controls */
        .simulator-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--card-border);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 0%; height: 100%;
            background: rgba(255, 255, 255, 0.05);
            transition: width 0.3s ease;
            z-index: 0;
        }

        .btn:hover::before { width: 100%; }
        .btn span { position: relative; z-index: 1; }

        .btn-normal { border-left: 4px solid var(--accent-green); }
        .btn-restricted { border-left: 4px solid var(--accent-yellow); }
        .btn-spam { border-left: 4px solid var(--accent-red); }
        .btn-reset { border-left: 4px solid var(--text-muted); text-align: center; margin-top: 1rem;}

        .btn:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            text-align: center;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
            text-shadow: 0 0 15px currentColor;
        }

        .metric-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Logs Table */
        .log-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .log-table th, .log-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }

        .log-table th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .log-table tr {
            transition: background 0.2s ease;
        }

        .log-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .badge.allow { background: rgba(0, 255, 157, 0.1); color: var(--accent-green); border: 1px solid rgba(0, 255, 157, 0.2); }
        .badge.block { background: rgba(255, 51, 102, 0.1); color: var(--accent-red); border: 1px solid rgba(255, 51, 102, 0.2); animation: pulseBlock 2s infinite; }
        
        @keyframes pulseBlock {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 51, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); }
        }

        .score-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: var(--accent-green);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s ease;
        }

        /* User Profile in sidebar */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), #0055ff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .user-info h3 { font-size: 1.1rem; }
        .user-info p { color: var(--text-muted); font-size: 0.85rem; }

        .score-display {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-green);
            transition: color 0.3s ease;
        }
        
        /* Slide in animation for rows */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .new-row {
            animation: slideIn 0.3s ease forwards;
        }

    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-red"></div>

    <header>
        <h1><span>WAF</span> Security Center</h1>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green);"></div>
            <span style="color: var(--text-muted); font-weight: 600;">SYSTEM ACTIVE</span>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar Controls -->
        <aside class="card">
            <div class="user-profile">
                <div class="avatar">U</div>
                <div class="user-info">
                    <h3>User_123</h3>
                    <p>Role: <span style="color: var(--accent-blue)">Normal</span></p>
                </div>
            </div>

            <div class="card-header">Threat Score</div>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div class="score-display" id="currentUserScore">0</div>
                <div style="color: var(--text-muted); font-size: 0.9rem;">/ 60 Threshold</div>
            </div>
            <div class="score-bar" style="margin-bottom: 2rem;">
                <div class="score-fill" id="scoreBarFill"></div>
            </div>

            <div class="card-header">Live Attack Simulation</div>
            <div class="simulator-panel">
                <button class="btn btn-normal" onclick="simulateRequest('/products')">
                    <span>🛒 Browse Products (Normal)</span>
                </button>
                <button class="btn btn-restricted" onclick="simulateRequest('/admin')">
                    <span>🔑 Access /admin (Restricted)</span>
                </button>
                <button class="btn btn-spam" onclick="simulateSpam()">
                    <span>🔥 DDoS Spam (25 reqs)</span>
                </button>
                <button class="btn btn-reset" onclick="resetSimulation()" style="justify-content: center;">
                    <span>🔄 Reset Environment</span>
                </button>
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="log-container">
            <div class="metrics-grid">
                <div class="card metric-card">
                    <div class="metric-label">Total Requests Analyzed</div>
                    <div class="metric-value" style="color: var(--accent-blue);" id="metricTotal">0</div>
                </div>
                <div class="card metric-card">
                    <div class="metric-label">Blocked Requests</div>
                    <div class="metric-value" style="color: var(--accent-red);" id="metricBlocked">0</div>
                </div>
                <div class="card metric-card">
                    <div class="metric-label">Active Threats</div>
                    <div class="metric-value" style="color: var(--accent-yellow);" id="metricThreats">0</div>
                </div>
            </div>

            <div class="card" style="flex-grow: 1; overflow-y: auto; max-height: 500px;">
                <div class="card-header">
                    <span>Real-time Request Logs</span>
                    <span id="logStatus" style="font-size: 0.8rem; color: var(--accent-green);">Listening...</span>
                </div>
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Endpoint</th>
                            <th>Action</th>
                            <th>Reason</th>
                            <th>Total Score</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        <!-- Logs will be inserted here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- JS Implementation of Insider Threat Detector ---
        class InsiderThreatDetector {
            constructor() {
                this.threshold = 60;
                this.score = 0;
                this.requestHistory = [];
                this.isBlocked = false;
                this.endpointHistory = new Set();
            }

            analyze(endpoint, role) {
                if (this.isBlocked) {
                    return { action: "BLOCK", reason: "User already flagged as Insider Threat", score: this.score };
                }

                let addedScore = 0;
                const now = Date.now();

                // 1. Role / Route check
                if (endpoint === '/admin' && role !== 'admin') {
                    addedScore += 50;
                }

                // 2. Request Rate check (Spike detection)
                // Keep only last 5 seconds
                this.requestHistory = this.requestHistory.filter(time => now - time <= 5000);
                this.requestHistory.push(now);

                if (this.requestHistory.length > 20) {
                    addedScore += 30; // High rate
                }

                // 3. Deviation check
                if (this.endpointHistory.size > 0 && !this.endpointHistory.has(endpoint) && endpoint === '/admin') {
                    addedScore += 10;
                }

                this.endpointHistory.add(endpoint);
                this.score += addedScore;

                if (this.score > this.threshold) {
                    this.isBlocked = true;
                    return { action: "BLOCK", reason: `Behavioral Anomaly! Score: ${this.score}`, score: this.score };
                }

                return { action: "ALLOW", reason: addedScore > 0 ? "Suspicious activity detected" : "Normal request", score: this.score };
            }
        }

        let waf = new InsiderThreatDetector();
        let totalRequests = 0;
        let blockedRequests = 0;

        function updateUI(res, endpoint) {
            // Update Metrics
            totalRequests++;
            document.getElementById('metricTotal').innerText = totalRequests;
            
            if (res.action === "BLOCK") {
                blockedRequests++;
                document.getElementById('metricBlocked').innerText = blockedRequests;
            }

            if (waf.isBlocked) {
                document.getElementById('metricThreats').innerText = "1";
                document.getElementById('currentUserScore').style.color = "var(--accent-red)";
                document.getElementById('logStatus').innerText = "THREAT DETECTED";
                document.getElementById('logStatus').style.color = "var(--accent-red)";
            } else if (waf.score > 0) {
                document.getElementById('currentUserScore').style.color = "var(--accent-yellow)";
            } else {
                document.getElementById('currentUserScore').style.color = "var(--accent-green)";
            }

            // Update Score Display
            document.getElementById('currentUserScore').innerText = waf.score;
            let percent = Math.min((waf.score / 60) * 100, 100);
            const fill = document.getElementById('scoreBarFill');
            fill.style.width = percent + '%';
            
            if (percent >= 100) fill.style.background = "var(--accent-red)";
            else if (percent > 0) fill.style.background = "var(--accent-yellow)";
            else fill.style.background = "var(--accent-green)";

            // Add Log Entry
            const tbody = document.getElementById('logTableBody');
            const row = document.createElement('tr');
            row.className = 'new-row';
            
            const timeStr = new Date().toLocaleTimeString();
            const badgeClass = res.action === 'ALLOW' ? 'badge allow' : 'badge block';
            
            row.innerHTML = `
                <td style="color: var(--text-muted)">${timeStr}</td>
                <td style="font-family: monospace; color: var(--accent-blue)">${endpoint}</td>
                <td><span class="${badgeClass}">${res.action}</span></td>
                <td style="color: ${res.action === 'BLOCK' ? 'var(--accent-red)' : 'var(--text-muted)'}">${res.reason}</td>
                <td><strong>${res.score}</strong></td>
            `;

            tbody.prepend(row);
        }

        function simulateRequest(endpoint) {
            const res = waf.analyze(endpoint, "normal");
            updateUI(res, endpoint);
        }

        async function simulateSpam() {
            if (waf.isBlocked) {
                simulateRequest("/products");
                return;
            }
            
            for (let i = 0; i < 25; i++) {
                simulateRequest("/products");
                if (waf.isBlocked) break;
                // Tiny delay for visual effect
                await new Promise(r => setTimeout(r, 50));
            }
        }

        function resetSimulation() {
            waf = new InsiderThreatDetector();
            totalRequests = 0;
            blockedRequests = 0;
            
            document.getElementById('metricTotal').innerText = "0";
            document.getElementById('metricBlocked').innerText = "0";
            document.getElementById('metricThreats').innerText = "0";
            
            document.getElementById('currentUserScore').innerText = "0";
            document.getElementById('currentUserScore').style.color = "var(--accent-green)";
            
            document.getElementById('scoreBarFill').style.width = "0%";
            document.getElementById('scoreBarFill').style.background = "var(--accent-green)";
            
            document.getElementById('logTableBody').innerHTML = "";
            document.getElementById('logStatus').innerText = "Listening...";
            document.getElementById('logStatus').style.color = "var(--accent-green)";
        }
    </script>
</body>
</html>
